<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mouse Hover Event</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>Mouse Hover Event Example</h2>

<button id="submitBtn">Submit</button>

<script>
document.getElementById("submitBtn").addEventListener("mouseover", () => {
    console.log("Mouse hovered over submit button");
});
</script>

</body>
</html>
