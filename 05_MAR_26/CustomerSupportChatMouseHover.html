<!DOCTYPE html>
<html>
<head>
<title>Customer Support Chat</title>

<style>
#chatIcon{
    font-size:20px;
    cursor:pointer;
    padding:10px;
    background-color:#f0f0f0;
    display:inline-block;
    border-radius:5px;
}

#info{
    margin-top:15px;
    color:blue;
}
</style>

</head>

<body>

<h2>Customer Support</h2>

<div id="chatIcon">💬 Chat Support</div>

<p id="info"></p>

<script>

document.getElementById("chatIcon").addEventListener("mouseover", function(){

    // Display tooltip message in UI
    document.getElementById("info").innerText =
    "Click here to talk with customer support";

    // Log message in console
    console.log("Mouse hovered over chat icon");

});

</script>

</body>
</html>
