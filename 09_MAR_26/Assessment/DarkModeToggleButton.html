<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Mode Toggle</title>

<style>
body{
    background:white;
    color:black;
    font-family:Arial, sans-serif;
    text-align:center;
    margin-top:100px;
    transition:0.3s;
}

.dark{
    background:black;
    color:white;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>Dark Mode Toggle Example</h2>

<button id="darkMode">Toggle Dark Mode</button>

<script>
document.getElementById("darkMode").addEventListener("click", () => {
    document.body.classList.toggle("dark");
});
</script>

</body>
</html>
