<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login Button Click Event</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    margin-top: 100px;
}

button{
    padding:10px 20px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>Login Button Example</h2>

<button id="loginBtn">Login</button>

<script>
document.getElementById("loginBtn").addEventListener("click", (e) => {

console.log("Login button clicked");

alert("Login process started");

});
</script>

</body>
</html>
