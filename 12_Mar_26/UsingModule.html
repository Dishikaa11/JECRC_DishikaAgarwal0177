<body>
    <h1>Using Modules in JavaScript</h1>
    <div class="box">
<h2>Project 1</h2>
<input id="email" placeholder="Enter email">
<button onclick="checkEmail()">Check</button>
<p id="result" class="result"></p>
</div>

<div class="box">
<h2>Using Utils</h2>
<p>Today Date: <span id="date3"></span></p>
<input id="email3" placeholder="Enter email">
<button onclick="checkEmail3()">Check</button>
<p id="result3" class="result"></p>
</div>
    <script>
        //Before using Modules
        function fomatDate(date){
            return `${date.getDate()}/${date.getMonth() + 1}/${date.getFullYear()}`;
        }
        function validateEmail(email){
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        function checkEmail(){
            const email = document.getElementById('email').value;
            const result = validateEmail(email) ? 'Valid Email' : 'Invalid Email';
            document.getElementById('result').innerText = result;
        }
